name: Auto-sync (Gmail, Google Kalender, Outlook, Notion)

on:
  schedule:
    # Hver 15. minut. Vercel Hobby-planen tillader kun cron 1x/dag,
    # så vi kører synken herfra i stedet (GitHub Actions er gratis).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Kald sync-endpoint
        run: |
          curl -sS -X POST "${{ secrets.SITE_URL }}/api/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
