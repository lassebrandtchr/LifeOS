name: Auto-sync (Gmail, Google Kalender, Outlook, Notion)

on:
  schedule:
    # Hver 30. minut (Lasses oenskede kadence). Vercel Hobby-planen tillader
    # kun cron 1x/dag, saa vi koerer synken herfra i stedet (GitHub Actions
    # er gratis). OBS: GitHub koerer schedules "efter bedste evne" - der kan
    # vaere forsinkelser i spidsbelastning; klient-AutoSync (30 min, mens
    # appen er aaben) er sikkerhedsnettet.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Kald sync-endpoint
        run: |
          # Eksplicit statustjek: KUN HTTP 200 er succes. curl's --fail
          # fejler ikke paa 3xx, saa en redirect til /login lignede succes
          # i maanedsvis, mens synken reelt aldrig koerte.
          status=$(curl -sS -o /tmp/sync-body -w "%{http_code}" -X POST \
            "${{ secrets.SITE_URL }}/api/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $status"
          cat /tmp/sync-body
          [ "$status" = "200" ]
